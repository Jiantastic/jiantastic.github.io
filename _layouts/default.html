<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% seo %}

    <link rel="icon" href="/favicon.ico" />
    {% if page.rss_url %}
    <link rel="alternate" type="application/rss+xml" title="{{ page.rss_title | default: page.title | escape }}" href="{{ page.rss_url }}" />
    {% endif %}
    {% if page.hero_image %}
    <link rel="preload" as="image" href="{{ page.hero_image }}" fetchpriority="high" />
    {% endif %}
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body class="page-{{ page.title | default: 'site' | slugify }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    {% include nav.html %}

    <main class="main" id="main-content">{{ content }}</main>

    {% include footer.html %}
    <script src="/assets/js/site.js" defer></script>
  </body>
</html>
